name: Cat Litter AI Inference
version: "1.0.0"
description: 猫砂盆视觉判断AI推理服务
slug: cat_litter_ai_inference
init: false
arch:
  - amd64
  - aarch64
url: https://github.com/lzg134679/cat-litter-ai-inference
startup: application
boot: auto
webui: http://[HOST]:[PORT:5555]
panel_icon: mdi:cat
ingress: true
environment:
  TZ: "{{ timezone }}"
  PORT: "{{ port }}"
ports:
  5555/tcp: 5555
options:
  log_level: info
  port: 5555
schema:
  log_level:
    type: string
    default: info
    description: "日志级别"
  port:
    type: integer
    default: 5555
    minimum: 1024
    maximum: 65535
